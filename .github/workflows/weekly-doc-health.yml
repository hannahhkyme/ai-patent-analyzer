name: Weekly API doc health

on:
  schedule:
    # TEMP: every 5 minutes UTC (for testing). Revert to: 0 9 * * 1  (Mon 09:00 UTC)
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  verify-api-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify API reference matches App Router handlers
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
        run: npm run verify:api -- --linear
