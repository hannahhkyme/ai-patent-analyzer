name: Weekly API doc health

on:
  schedule:
    - cron: "0 9 * * 1" # Mon 09:00 UTC
  workflow_dispatch:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run documentation drift detection (HEAD~1..HEAD)
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_SESSIONS_URL: ${{ secrets.DEVIN_SESSIONS_URL }}
          DOCS_PAGE_URL: ${{ secrets.DOCS_PAGE_URL }}
          API_DOCS_PATH: ${{ secrets.API_DOCS_PATH }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
        run: node scripts/detect-drift.js
