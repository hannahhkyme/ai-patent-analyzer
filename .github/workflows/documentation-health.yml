# Push to main → detect-drift.js (HIGH → Devin).
# Weekly schedule → npm run verify:api (catalog vs route files).
# workflow_dispatch → runs both jobs (for testing).

name: Documentation health

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mon 09:00 UTC
  workflow_dispatch:

jobs:
  detect-drift-on-merge:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Drift detection (HEAD~1..HEAD) — Devin on HIGH
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_SESSIONS_URL: ${{ secrets.DEVIN_SESSIONS_URL }}
          DOCS_PAGE_URL: ${{ secrets.DOCS_PAGE_URL }}
          API_DOCS_PATH: ${{ secrets.API_DOCS_PATH }}
        run: node scripts/detect-drift.js

  verify-api-catalog-weekly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Verify lib/api-reference vs app/api route handlers
        run: npm run verify:api
